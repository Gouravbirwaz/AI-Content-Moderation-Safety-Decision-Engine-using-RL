name: AIContentModeration
version: 1.1.0
description: "A production-grade content moderation simulation for Meta-scale challenges."
author: "Antigravity"
tags: ["moderation", "safety", "safety-engine", "openenv", "multimodal", "pytorch-hackathon"]

environment:
  class: env.env.ContentModerationEnv
  models:
    observation: env.models.Observation
    action: env.models.Action
    reward: env.models.Reward
    state: env.models.State

tasks:
  - id: multimodal_hard
    name: "Multimodal Adversarial Challenge"
    difficulty: HARD
    max_steps: 10
    description: "Detect safety violations in images paired with safe-looking text."
  
  - id: policy_drift
    name: "Dynamic Policy Adaptation"
    difficulty: MEDIUM
    max_steps: 15
    description: "Handle evolving safety guidelines and shifting platform risk."

dependencies:
  python: ">=3.9"
  pip:
    - pydantic>=2.0.0
    - openai>=1.0.0
    - pyyaml
